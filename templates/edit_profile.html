<!DOCTYPE html>
<html>

<head>

<title>Edit Profile</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<div class="card p-4">

<h2>Edit Profile</h2>

<form action="/update-profile" method="POST">

<div class="mb-3">
<input class="form-control" type="text" name="name" value="{{user[1]}}" required>
</div>

<div class="mb-3">
<input class="form-control" type="email" name="email" value="{{user[2]}}" required>
</div>

<button class="btn btn-success">Update</button>

</form>

</div>

</div>

</body>
</html>
