<!DOCTYPE html>
<html>

<head>

<title>Users</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<h2 class="text-center">Registered Users</h2>

<table class="table table-bordered">

<tr>
<th>ID</th>
<th>Name</th>
<th>Email</th>
<th>Action</th>
</tr>

{% for user in users %}

<tr>
<td>{{user[0]}}</td>
<td>{{user[1]}}</td>
<td>{{user[2]}}</td>

<td>
<a class="btn btn-danger btn-sm" href="/delete/{{user[0]}}">
Delete
</a>
</td>

</tr>

{% endfor %}

</table>

<a class="btn btn-secondary" href="/dashboard">Back</a>

</div>

</body>
</html>
